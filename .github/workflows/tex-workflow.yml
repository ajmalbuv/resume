name: LaTeX Compilation
on:
  push:
    branches:
      - master
    paths:
      - "**/*.tex"
      - "photo.jpg"
  workflow_dispatch:
    inputs:
      rebuild_all:
        description: "Rebuild all files"
        required: false
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    container: ghcr.io/xu-cheng/texlive-full:latest
    steps:
      - name: Install Git and Dependencies
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          apk add --no-cache git git-lfs bash

      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
          lfs: true

      - name: Get changed files
        id: changed-files
        uses: tj-actions/changed-files@v45
        with:
          files_yaml: |
            photo:
              - photo.jpg
            root:
              - "*.tex"

      - name: Determine files to compile
        id: files
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && "${{ github.event.inputs.rebuild_all }}" == "true" ]] || [[ "${{ steps.changed-files.outputs.photo_any_changed }}" == "true" ]]; then
            echo "Photo changed or manual full rebuild. Compiling all root LaTeX files..."
            FILES=$(find . -maxdepth 1 -name "*.tex" | sed 's|^./||' | xargs)
          else
            echo "Source files changed. Compiling only changed files..."
            FILES="${{ steps.changed-files.outputs.root_all_changed_files }}"
          fi

          if [[ -z "$FILES" && ("${{ steps.changed-files.outputs.any_changed }}" == "true" || "${{ github.event_name }}" == "workflow_dispatch") ]]; then
            echo "FILES is empty but rebuild is required. Falling back to all root files..."
            FILES=$(find . -maxdepth 1 -name "*.tex" | sed 's|^./||' | xargs)
          fi

          if [[ -z "$FILES" ]]; then
            echo "any=false" >> $GITHUB_OUTPUT
          else
            echo "any=true" >> $GITHUB_OUTPUT
            echo "all=$FILES" >> $GITHUB_OUTPUT
          fi

      - name: Compile LaTeX files
        if: steps.files.outputs.any == 'true'
        run: |
          for file in ${{ steps.files.outputs.all }}; do
            [[ "$file" != *.tex ]] && continue
            [[ "$file" == */* ]] && continue
            [[ "$file" == ./* ]] && file="${file#./}"

            echo "Compiling $file..."
            latexmk -pdf -interaction=nonstopmode -shell-escape "$file"
          done

      - name: Convert to PNG
        if: steps.files.outputs.any == 'true'
        uses: ./.github/actions/pdf-to-png
        with:
          files: ${{ steps.files.outputs.all }}

      - name: Commit changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Format and compile LaTeX files"
          commit_user_name: GitHub Actions
          commit_user_email: actions@github.com
          commit_author: Author <actions@github.com>
          file_pattern: "*.pdf *.png"
